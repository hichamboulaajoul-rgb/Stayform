<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenue — Stayform</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #2D4A3E; --green2: #4A7C65;
  --gold: #D4A853; --bg: #FAF6F1;
  --surface: #fff; --border: #EAE0D5;
  --text: #1C120A; --text2: #6B5848; --text3: #B09A88;
}
body { background: var(--bg); font-family: 'Nunito Sans', sans-serif; color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--green);
  padding: 1.4rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Nunito', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; }
.logo span { color: var(--gold); }
.header-badge {
  background: rgba(212,168,83,0.15); border: 1px solid rgba(212,168,83,0.4);
  color: var(--gold); font-size: 0.72rem; font-weight: 700;
  padding: 0.3rem 0.8rem; border-radius: 20px; letter-spacing: 0.05em;
}

/* HERO */
.hero {
  background: linear-gradient(135deg, var(--green) 0%, #1A3028 100%);
  padding: 2.5rem 1.5rem 3rem;
  text-align: center; position: relative; overflow: hidden;
}
.hero::before {
  content: '🌙'; font-size: 6rem; position: absolute;
  top: -1rem; right: -1rem; opacity: 0.08;
}
.hero-emoji { font-size: 2.8rem; margin-bottom: 0.8rem; }
.hero h1 {
  font-family: 'Nunito', sans-serif; font-size: 1.6rem; font-weight: 800;
  color: #fff; margin-bottom: 0.4rem; line-height: 1.2;
}
.hero p { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
.hero .prop-name {
  display: inline-block; margin-top: 1rem;
  background: rgba(212,168,83,0.2); border: 1px solid rgba(212,168,83,0.4);
  color: var(--gold); font-size: 0.82rem; font-weight: 600;
  padding: 0.4rem 1rem; border-radius: 20px;
}

/* CONTENT */
.content { padding: 1.5rem; max-width: 520px; margin: 0 auto; }

/* CARD */
.card {
  background: var(--surface); border-radius: 16px;
  border: 1px solid var(--border); margin-bottom: 1rem;
  overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.card-header {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
  background: #FAFAF8;
}
.card-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.card-icon.green { background: rgba(45,74,62,0.1); }
.card-icon.gold  { background: rgba(212,168,83,0.15); }
.card-icon.blue  { background: rgba(59,130,246,0.1); }
.card-icon.red   { background: rgba(239,68,68,0.1); }
.card-title { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.92rem; color: var(--text); }
.card-sub   { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }
.card-body  { padding: 1.2rem; }

/* ROW */
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 0.75rem; color: var(--text3); }
.info-value { font-size: 0.88rem; font-weight: 700; color: var(--text); font-family: 'Nunito', sans-serif; }

/* CODE BOX */
.code-box {
  background: linear-gradient(135deg, var(--green) 0%, #1A3028 100%);
  border-radius: 12px; padding: 1.2rem 1.4rem;
  display: flex; align-items: center; justify-content: space-between;
}
.code-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
.code-value { font-size: 1.8rem; font-weight: 800; color: #fff; font-family: 'Nunito', sans-serif; letter-spacing: 0.1em; }
.code-type  { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* WIFI BOX */
.wifi-box {
  background: #F0F4FF; border-radius: 12px; padding: 1rem 1.2rem;
  display: flex; align-items: center; gap: 1rem;
}
.wifi-icon { font-size: 1.8rem; }
.wifi-name  { font-size: 0.78rem; color: var(--text3); margin-bottom: 2px; }
.wifi-value { font-size: 1rem; font-weight: 700; color: #1A3028; font-family: 'Nunito', sans-serif; }
.wifi-pass  { font-size: 0.82rem; color: #4466CC; margin-top: 4px; font-family: monospace; letter-spacing: 0.05em; }

/* COPY BTN */
.btn-copy {
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 8px; padding: 0.5rem 0.9rem;
  font-size: 0.75rem; font-weight: 600; cursor: pointer;
  color: var(--text2); font-family: 'Nunito', sans-serif;
  transition: all 0.15s; white-space: nowrap;
}
.btn-copy:hover { background: var(--green); color: #fff; border-color: var(--green); }

/* RULES */
.rule-item {
  display: flex; align-items: flex-start; gap: 0.7rem;
  padding: 0.5rem 0; border-bottom: 1px solid var(--border);
  font-size: 0.82rem; color: var(--text2); line-height: 1.5;
}
.rule-item:last-child { border-bottom: none; }
.rule-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 0.4rem; }

/* MESSAGE HOTE */
.host-msg {
  background: linear-gradient(135deg, #FBF7EE 0%, #F5EDD8 100%);
  border: 1px solid rgba(212,168,83,0.3);
  border-radius: 12px; padding: 1.2rem;
  font-size: 0.85rem; color: var(--text2); line-height: 1.7;
  font-style: italic; position: relative;
}
.host-msg::before {
  content: '"'; font-size: 3rem; color: var(--gold); opacity: 0.3;
  position: absolute; top: -0.5rem; left: 0.8rem;
  font-family: Georgia, serif; line-height: 1;
}
.host-sig { margin-top: 0.8rem; font-size: 0.78rem; font-weight: 700; color: var(--text3); font-style: normal; }

/* FOOTER */
.footer { text-align: center; padding: 2rem 1rem; color: var(--text3); font-size: 0.72rem; }
.footer a { color: var(--green); text-decoration: none; font-weight: 600; }

/* TOAST */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: #1A2E4A; color: #fff; padding: 0.7rem 1.4rem;
  border-radius: 20px; font-size: 0.82rem; font-weight: 600;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; }

@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.card { animation: fadeUp 0.3s ease both; }
.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }
.card:nth-child(5) { animation-delay: 0.2s; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Stay<span>form</span></div>
  <div class="header-badge">✓ CHECK-IN VALIDÉ</div>
</div>

<div class="hero">
  <div class="hero-emoji">🏡</div>
  <h1 id="heroTitle">Bienvenue !</h1>
  <p id="heroSub">Voici toutes les informations pour votre séjour</p>
  <div class="prop-name" id="heroProp"></div>
</div>

<div class="content" id="mainContent">
  <!-- Généré dynamiquement -->
</div>

<div class="footer">
  Généré par <a href="https://hichamboulaajoul-rgb.github.io/Stayform/">Stayform</a> · Plateforme de check-in digital au Maroc
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://syvpyvkgauyfqghwiqsl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dnB5dmtnYXV5ZnFnaHdpcXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTYzMDcsImV4cCI6MjA4ODk5MjMwN30.Iu0s8WeJcFrZUXkYRHbQBUvZMOMdsvgip_wnEVtXRO4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function copyText(text, label) {
  navigator.clipboard.writeText(text).then(() => showToast('✓ ' + label + ' copié !'));
}

async function loadWelcome() {
  const params = new URLSearchParams(window.location.search);
  const propId  = params.get('p');
  const guestId = params.get('g');
  const hostId  = params.get('h');

  if (!propId || !hostId) {
    document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:3rem;color:#888;">Lien invalide ou expiré.</div>';
    return;
  }

  // Charger les données
  const [propRes, hostRes, guestRes] = await Promise.all([
    sb.from('properties').select('*').eq('id', propId).single(),
    sb.from('profiles').select('name').eq('id', hostId).single(),
    guestId ? sb.from('guests').select('name,dates,nights,arrival_time,guest_count').eq('id', guestId).single() : Promise.resolve({ data: null })
  ]);

  const prop  = propRes.data;
  const host  = hostRes.data;
  const guest = guestRes.data;

  if (!prop) {
    document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:3rem;color:#888;">Hébergement introuvable.</div>';
    return;
  }

  // Mettre à jour le hero
  const guestFirstName = guest && guest.name ? guest.name.split(' ')[0] : 'cher(e) voyageur';
  document.getElementById('heroTitle').textContent = 'Bienvenue ' + guestFirstName + ' ! 🎉';
  document.getElementById('heroSub').textContent = 'Voici toutes les informations pour votre séjour';
  document.getElementById('heroProp').textContent = (prop.cover_emoji || '🏠') + ' ' + prop.name;

  const content = document.getElementById('mainContent');
  let html = '';

  // ── Infos séjour ──
  if (guest) {
    html += `<div class="card">
      <div class="card-header">
        <div class="card-icon green">📅</div>
        <div><div class="card-title">Votre séjour</div><div class="card-sub">${prop.name}</div></div>
      </div>
      <div class="card-body">
        <div class="info-row"><span class="info-label">Dates</span><span class="info-value">${guest.dates || '—'}</span></div>
        <div class="info-row"><span class="info-label">Durée</span><span class="info-value">${guest.nights || '—'} nuit(s)</span></div>
        <div class="info-row"><span class="info-label">Voyageurs</span><span class="info-value">${guest.guest_count || '—'}</span></div>
        ${guest.arrival_time ? `<div class="info-row"><span class="info-label">Heure d'arrivée prévue</span><span class="info-value">${guest.arrival_time}</span></div>` : ''}
        ${prop.checkin_time ? `<div class="info-row"><span class="info-label">Check-in possible dès</span><span class="info-value">${prop.checkin_time}</span></div>` : ''}
        ${prop.checkout_time ? `<div class="info-row"><span class="info-label">Check-out avant</span><span class="info-value">${prop.checkout_time}</span></div>` : ''}
      </div>
    </div>`;
  }

  // ── Code d'accès ──
  if (prop.lock_code_template || params.get('code')) {
    const code = params.get('code') || '';
    if (code) {
      const codeFmt = code.slice(0,3) + ' ' + code.slice(3,5) + ' ' + code.slice(5);
      html += `<div class="card">
        <div class="card-header">
          <div class="card-icon gold">🔑</div>
          <div><div class="card-title">Accès au logement</div><div class="card-sub">Code pour entrer</div></div>
        </div>
        <div class="card-body">
          <div class="code-box">
            <div>
              <div class="code-label">Code d'accès</div>
              <div class="code-value">${codeFmt}</div>
              <div class="code-type">Serrure numérique</div>
            </div>
            <button class="btn-copy" onclick="copyText('${code}', 'Code')">📋 Copier</button>
          </div>
          ${prop.address ? `<div style="margin-top:0.9rem;font-size:0.82rem;color:var(--text3);">📍 ${prop.address}</div>` : ''}
        </div>
      </div>`;
    }
  }

  // ── WiFi ──
  if (prop.wifi_name) {
    html += `<div class="card">
      <div class="card-header">
        <div class="card-icon blue">📶</div>
        <div><div class="card-title">Connexion WiFi</div><div class="card-sub">Réseau disponible dans le logement</div></div>
      </div>
      <div class="card-body">
        <div class="wifi-box">
          <div class="wifi-icon">📶</div>
          <div style="flex:1;">
            <div class="wifi-name">Réseau</div>
            <div class="wifi-value">${prop.wifi_name}</div>
            ${prop.wifi_password ? `<div class="wifi-pass">🔒 ${prop.wifi_password}</div>` : ''}
          </div>
          ${prop.wifi_password ? `<button class="btn-copy" onclick="copyText('${prop.wifi_password}', 'Mot de passe WiFi')">📋</button>` : ''}
        </div>
      </div>
    </div>`;
  }

  // ── Règles ──
  if (prop.rules) {
    const rulesList = prop.rules.split('\n').filter(r => r.trim());
    html += `<div class="card">
      <div class="card-header">
        <div class="card-icon red">📋</div>
        <div><div class="card-title">Règles du logement</div><div class="card-sub">À respecter durant votre séjour</div></div>
      </div>
      <div class="card-body">
        ${rulesList.map(r => `<div class="rule-item"><div class="rule-dot"></div><div>${r.trim()}</div></div>`).join('')}
      </div>
    </div>`;
  }

  // ── Message de l'hôte ──
  if (params.get('msg')) {
    const msg = decodeURIComponent(params.get('msg'));
    html += `<div class="card">
      <div class="card-header">
        <div class="card-icon green">💬</div>
        <div><div class="card-title">Message de votre hôte</div><div class="card-sub">${host ? host.name : 'Votre hôte'}</div></div>
      </div>
      <div class="card-body">
        <div class="host-msg">
          ${msg}
          <div class="host-sig">— ${host ? host.name : 'Votre hôte'}</div>
        </div>
      </div>
    </div>`;
  }

  // ── Contact hôte ──
  html += `<div class="card">
    <div class="card-header">
      <div class="card-icon green">🙋</div>
      <div><div class="card-title">Besoin d'aide ?</div><div class="card-sub">Contactez votre hôte</div></div>
    </div>
    <div class="card-body" style="text-align:center;padding:1.5rem;">
      <div style="font-size:0.85rem;color:var(--text3);margin-bottom:1rem;">Une question ? Votre hôte est disponible pour vous aider.</div>
      ${params.get('wa') ? `<a href="https://wa.me/${params.get('wa')}" style="display:inline-flex;align-items:center;gap:0.5rem;background:#25D366;color:#fff;border:none;border-radius:10px;padding:0.8rem 1.5rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;text-decoration:none;">💬 WhatsApp</a>` : ''}
    </div>
  </div>`;

  content.innerHTML = html;
}

loadWelcome();
</script>
</body>
</html>
